<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API Data Fetcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 32px;
            background: #f9f9f9;
        }
        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px #0001;
            max-width: 500px;
            margin: auto;
            padding: 24px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            background: #fafafa;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .result, .error {
            margin: 12px 0;
            padding: 12px;
            border-radius: 4px;
        }
        .result {
            background: #e8fbee;
            color: #239235;
        }
        .error {
            background: #fbe8e8;
            color: #c0392b;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: inline-block;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            padding: 6px;
            font-size: 1em;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            padding: 8px 20px;
            background: #2980b9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover {
            background: #1a5e8a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>API v1 Demo</h1>

        <button id="getBtn">GET Data</button>
        <div id="getResult"></div>
        <hr>

        <h2>Create User</h2>
        <form id="createUserForm">
            <div class="form-group">
                <label for="first_name">First Name:</label>
                <input type="text" id="first_name" name="first_name" required value="John">
            </div>
            <div class="form-group">
                <label for="last_name">Last Name:</label>
                <input type="text" id="last_name" name="last_name" required value="Doe">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required value="jane.doe@example.com">
            </div>
            <div class="form-group">
                <label for="password_hash">Password:</label>
                <input type="password" id="password_hash" name="password_hash" required value="123456">
            </div>
            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required value="20">
            </div>
            <button type="submit">Create User</button>
        </form>
        <div id="createUserResult"></div>
    </div>
    <script>
        const apiUrl = "http://142.171.153.251:3000/api/v1";

        // GET data logic
        document.getElementById('getBtn').addEventListener('click', async () => {
            const resultDiv = document.getElementById('getResult');
            resultDiv.innerHTML = '';
            try {
                const response = await fetch(apiUrl + "/get-user");
                const data = await response.json();
                console.log(data);
                // The backend returns an array for /get-user, not {status, ...}.
                if (Array.isArray(data)) {
                    resultDiv.innerHTML = `
                        <div class="result">
                            <strong>Fetched ${data.length} users.</strong>
                            <table>
                                <tr><td><b>ID</b></td><td><b>First Name</b></td><td><b>Last Name</b></td><td><b>Age</b></td><td><b>Email</b></td></tr>
                                ${data.map((user)=>
                                    `<tr>
                                        <td>${user.id}</td>
                                        <td>${user.first_name}</td>
                                        <td>${user.last_name}</td>
                                        <td>${user.age}</td>
                                        <td>${user.email}</td>
                                    </tr>`
                                ).join('')}
                            </table>
                        </div>
                    `;
                } else if (data.status === "error") {
                    resultDiv.innerHTML = `<div class="error">Error: ${data.message || 'Unknown error.'}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">Unexpected response format.</div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="error">Fetch error: ${err.message}</div>`;
            }
        });

        // POST data logic
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const postResultDiv = document.getElementById('createUserResult');
            postResultDiv.innerHTML = '';

            // Grab the values from the form inputs using proper variable names
            // These must match backend expects: first_name, last_name, email, password_hash, age
            const first_name = document.getElementById('first_name').value;
            const last_name = document.getElementById('last_name').value;
            const email = document.getElementById('email').value;
            const password_hash = document.getElementById('password_hash').value;
            const age = document.getElementById('age').value;

            // first_name, last_name are submitted as part of the JSON object because the backend (Express/Sequelize) expects
            // user data as a single object, not as URL-encoded fields (like form fields or query params). So, when sending 
            // JSON, you put all user properties in one JS object and serialize it (see below).
            try {
                const response = await fetch(apiUrl + "/create-user", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ first_name, last_name, email, password_hash, age })
                });
                const data = await response.json();
                if (!data.status) {
                    // backend returns the created user object, so show the values
                    postResultDiv.innerHTML = `
                        <div class="result">
                            <strong>User created successfully!</strong>
                            <table>
                                <tr>
                                    <td>${data.id}</td>
                                    <td>${data.first_name}</td>
                                    <td>${data.last_name}</td>
                                    <td>${data.age}</td>
                                    <td>${data.email}</td>
                                </tr>
                            </table>
                        </div>
                    `;
                } else if (data.status === "error") {
                    postResultDiv.innerHTML = `<div class="error">Error: ${data.message || 'Unknown error.'}</div>`;
                } else {
                    postResultDiv.innerHTML = `<div class="error">Unexpected response format.</div>`;
                }
            } catch (err) {
                postResultDiv.innerHTML = `<div class="error">Fetch error: ${err.message}</div>`;
            }
        });
    </script>
</body>
</html>
